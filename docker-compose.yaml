services:
  tracker:
    build:
      context: ./src
      dockerfile: ./Dockerfile
    container_name: tracker
    restart: unless-stopped
    volumes:
      - ./src/.env:/app/.env
    depends_on:
      tracker-postgres:
        condition: service_healthy

  tracker-postgres:
    container_name: tracker-postgres
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracker
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d tracker" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: